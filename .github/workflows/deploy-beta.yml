name: Deploy Beta Branch to Hostinger

on:
  push:
    branches:
      - beta

jobs:
  web-deploy:
    name: 🎉 Deploy Beta
    runs-on: ubuntu-latest
    steps:
    - name: 🚚 Get latest code
      uses: actions/checkout@v4

    - name: 📂 Sync files to Hostinger Subdomain
      uses: wlixcc/SFTP-Deploy-Action@v1.2.6
      with:
        username: ${{ secrets.FTP_USERNAME }}
        server: ${{ secrets.FTP_SERVER }}
        port: 65002
        password: ${{ secrets.FTP_PASSWORD }}
        local_path: './*'
        remote_path: 'domains/rtchocos.com/public_html/beta'
        rsyncArgs: '--exclude=.git --exclude=.github --exclude=.htaccess --exclude=robots.txt --exclude=.env --exclude=assets/blogs/'
